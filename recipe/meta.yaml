{% set versions = {
    "7.3.0": "REPLACE_WITH_SHA256"
} %}

{% set version = environ.get('COMMIT_VERSION', None) %}
{% set version = version or versions.keys()|first %}
{% set version = version|string %}

{% set name = environ.get('ANACONDA_PACKAGE', 'herwig7')|string|lower %}

package:
  name: {{ name }}
  version: {{ environ.get('ANACONDA_VERSION', version)|replace("-", ".") }}

source:
  # TODO: herwig.hepforge.org is behind an anti-bot page (Anubis) that blocks
  # scripted fetches -- confirm the real tarball URL by hand (the official
  # install path is a bootstrap script, herwig.hepforge.org/downloads/herwig-bootstrap,
  # which builds ThePEG + Herwig together via Mercurial, not a plain tarball).
  url: "https://herwig.hepforge.org/downloads/?f=Herwig-{{ version }}.tar.bz2"
  fn: "Herwig-{{ version }}.tar.bz2"
  {% if versions.get(version, None) %}
  sha256: {{ versions.get(version) }}
  {% endif %}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - make
    - automake
    - libtool
  host:
    # TODO: Herwig 7 requires its own ThePEG library (same maintainers, not
    # yet packaged in hep-forge or conda-forge) plus GSL, FastJet, LHAPDF,
    # Boost, HepMC. ThePEG needs to be built first.
  run:

test:
  commands:
    - echo "TODO: a real smoke test"

about:
  home: "https://herwig.hepforge.org/"
  license: "GPL-3.0-or-later"
  summary: "Herwig 7: general-purpose Monte Carlo event generator for particle physics"

extra:
  recipe-maintainers:
    - meiyasan
